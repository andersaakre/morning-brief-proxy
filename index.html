<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morning Brief</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem; }
    h1 { font-size: 1.6rem; font-weight: 500; margin-bottom: .25rem; }
    .label { font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: #888; margin-bottom: .25rem; }
    .subtitle { font-size: .85rem; color: #666; margin-bottom: 1.5rem; }
    .topics { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
    .badge { display: inline-flex; align-items: center; gap: .4rem; border-radius: 20px; padding: 4px 12px; font-size: .8rem; font-weight: 500; }
    .badge button { background: none; border: none; cursor: pointer; font-size: .7rem; opacity: .6; }
    .row { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: .9rem; }
    button.primary { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: .9rem; cursor: pointer; }
    button.primary:disabled { background: #ccc; cursor: default; }
    button.secondary { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 16px; font-size: .85rem; cursor: pointer; }
    #generate { width: 100%; margin-top: .5rem; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; gap: .6rem; margin-bottom: .75rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .card-title { font-size: 1rem; font-weight: 500; flex: 1; }
    .count { font-size: .75rem; color: #888; background: #f5f5f3; border-radius: 20px; padding: 2px 10px; }
    .summary { font-size: .875rem; line-height: 1.7; background: #f5f5f3; border-radius: 8px; padding: 10px 14px; margin-bottom: .75rem; }
    .market { border-left: 2px solid #e0e0e0; padding-left: .75rem; margin-bottom: .6rem; }
    .market p { font-size: .8rem; font-weight: 500; margin-bottom: .3rem; }
    .bar-row { display: flex; align-items: center; gap: .5rem; }
    .bar-bg { flex: 1; height: 3px; background: #eee; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .prob { font-size: .75rem; font-weight: 500; min-width: 30px; text-align: right; }
    .meta { font-size: .7rem; color: #aaa; margin-top: 3px; }
    .divider { border-top: 1px solid #eee; padding-top: .75rem; margin-bottom: .5rem; }
    .show-more { font-size: .75rem; color: #888; background: none; border: none; cursor: pointer; padding: 4px 0; }
    #brief { display: none; }
    .setup { max-width: 560px; }
    .italic { font-style: italic; color: #888; font-size: .85rem; }
  </style>
</head>
<body>

<div id="setup" class="setup">
  <p class="label">Morning Brief</p>
  <h1>Good morning</h1>
  <p class="subtitle">Real-money prediction market signals, turned into executive intelligence.</p>

  <p class="label" style="margin-bottom:.5rem">Your topics</p>
  <div class="topics" id="topics"></div>

  <div class="row">
    <input id="newTopic" placeholder="Add a topic (e.g. Fed interest rates)" />
    <button class="secondary" onclick="addTopic()">Add</button>
  </div>

  <button class="primary" id="generate" onclick="generate()">Generate today's brief</button>
</div>

<div id="brief">
  <p class="label">Morning Brief · Polymarket</p>
  <h1 id="brief-date"></h1>
  <p class="subtitle" id="brief-subtitle"></p>
  <div class="topics" id="brief-badges"></div>
  <button class="secondary" style="margin-bottom:1.5rem" onclick="showSetup()">Edit topics</button>
  <div id="brief-cards"></div>
</div>

<script>
const PROXY = "https://morning-brief-proxy.vercel.app/api/polymarket";
const ANTHROPIC = "https://morning-brief-proxy.vercel.app/api/polymarket";
const MODEL = "claude-sonnet-4-20250514";
const COLORS = ["#185FA5","#0F6E56","#993C1D","#3B6D11","#534AB7","#993556","#885EA0","#B45A10"];

let topics = ["War in Iran","Global trade tariffs","AI technology","Financial markets","US politics"];

function renderTopics() {
  const el = document.getElementById("topics");
  el.innerHTML = topics.map((t, i) => `
    <span class="badge" style="background:${COLORS[i%COLORS.length]}18;border:1px solid ${COLORS[i%COLORS.length]}55;color:${COLORS[i%COLORS.length]}">
      ${t}
      <button onclick="removeTopic(${i})">✕</button>
    </span>`).join("");
}

function removeTopic(i) { topics.splice(i,1); renderTopics(); }

function addTopic() {
  const inp = document.getElementById("newTopic");
  const t = inp.value.trim();
  if (t && !topics.includes(t)) { topics.push(t); renderTopics(); }
  inp.value = "";
}

document.getElementById("newTopic").addEventListener("keydown", e => { if (e.key === "Enter") addTopic(); });

function showSetup() {
  document.getElementById("setup").style.display = "";
  document.getElementById("brief").style.display = "none";
}

async function searchPolymarket(query) {
  const url = `${PROXY}?q=${encodeURIComponent(query)}&limit_per_type=8`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.events || [];
}

async function summarise(topic, events) {
  if (!events.length) return null;
  const markets = events.flatMap(e => e.markets || []);
  const lines = markets.slice(0,10).map(m => {
    try {
      const prices = JSON.parse(m.outcomePrices || "[]");
      const prob = prices[0] ? Math.round(parseFloat(prices[0])*100) : null;
      const vol = Number(m.volume||0);
      const volStr = vol>=1e6?`$${(vol/1e6).toFixed(1)}M`:vol>=1e3?`$${(vol/1e3).toFixed(0)}K`:`$${vol.toFixed(0)}`;
      return prob!=null ? `• "${m.question}" → ${prob}% Yes (vol ${volStr})` : `• ${m.question}`;
    } catch { return `• ${m.question}`; }
  }).join("\n");

  const res = await fetch(ANTHROPIC, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: MODEL, max_tokens: 500,
      system: "You are a concise analyst briefing a C-level executive. Write 3 tight sentences. No bullets, no headers.",
      messages: [{ role: "user", content: `Summarise these Polymarket prediction markets on "${topic}" for an executive. What do the probabilities signal strategically?\n\n${lines}` }]
    })
  });
  const d = await res.json();
  return d.content?.[0]?.text || null;
}

function probColor(p) {
  return p >= 70 ? "#0F6E56" : p >= 40 ? "#B45A10" : "#993C1D";
}

function renderMarket(m) {
  let prob = null;
  try { const p = JSON.parse(m.outcomePrices||"[]"); prob = p[0] ? Math.round(parseFloat(p[0])*100) : null; } catch {}
  const vol = Number(m.volume||0);
  const volStr = vol>=1e6?`$${(vol/1e6).toFixed(1)}M`:vol>=1e3?`$${(vol/1e3).toFixed(0)}K`:`$${vol.toFixed(0)}`;
  const color = prob != null ? probColor(prob) : "#aaa";
  return `
    <div class="market">
      <p>${m.question}</p>
      ${prob != null ? `
        <div class="bar-row">
          <div class="bar-bg"><div class="bar-fill" style="width:${prob}%;background:${color}"></div></div>
          <span class="prob" style="color:${color}">${prob}%</span>
        </div>` : ""}
      <p class="meta">Vol ${volStr}${m.endDate ? ` · closes ${new Date(m.endDate).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}` : ""}</p>
    </div>`;
}

function renderCard(topic, events, summary, color, error) {
  const markets = events.flatMap(e => e.markets||[]);
  const shown = markets.slice(0,4);
  const rest = markets.slice(4);
  const id = "card-" + topic.replace(/\W/g,"");
  return `
    <div class="card">
      <div class="card-header">
        <div class="dot" style="background:${color}"></div>
        <span class="card-title">${topic}</span>
        <span class="count">${markets.length} market${markets.length!==1?"s":""}</span>
      </div>
      ${error ? `<p style="color:#c0392b;font-size:.8rem;margin-bottom:.5rem">${error}</p>` : ""}
      ${summary ? `<div class="summary">${summary}</div>` : ""}
      ${markets.length===0 && !error ? `<p class="italic">No active markets found.</p>` : ""}
      ${markets.length > 0 ? `
        <div class="divider">
          ${shown.map(renderMarket).join("")}
          ${rest.length > 0 ? `
            <div id="${id}-more" style="display:none">${rest.map(renderMarket).join("")}</div>
            <button class="show-more" onclick="toggleMore('${id}')">+${rest.length} more markets</button>
          ` : ""}
        </div>` : ""}
    </div>`;
}

function toggleMore(id) {
  const el = document.getElementById(id+"-more");
  const btn = el.nextElementSibling;
  if (el.style.display === "none") {
    el.style.display = "";
    btn.textContent = "Show less";
  } else {
    el.style.display = "none";
    btn.textContent = `+${el.children.length} more markets`;
  }
}

async function generate() {
  const btn = document.getElementById("generate");
  btn.disabled = true;
  document.getElementById("setup").style.display = "none";
  document.getElementById("brief").style.display = "";

  const date = new Date().toLocaleDateString("en-GB",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  document.getElementById("brief-date").textContent = date;
  document.getElementById("brief-subtitle").textContent = "Loading…";
  document.getElementById("brief-badges").innerHTML = "";
  document.getElementById("brief-cards").innerHTML = "";

  const results = [];
  for (let i = 0; i < topics.length; i++) {
    const topic = topics[i];
    const color = COLORS[i % COLORS.length];
    document.getElementById("brief-subtitle").textContent = `Fetching "${topic}" (${i+1}/${topics.length})…`;

    let events = [], error = null;
    try { events = await searchPolymarket(topic); }
    catch(e) { error = `Fetch error: ${e.message}`; }

    document.getElementById("brief-subtitle").textContent = `Summarising "${topic}"…`;
    let summary = null;
    if (events.length) {
      try { summary = await summarise(topic, events); } catch {}
    }

    results.push({ topic, events, summary, color, error });
  }

  const total = results.reduce((s,r) => s + r.events.flatMap(e=>e.markets||[]).length, 0);
  document.getElementById("brief-subtitle").textContent = `${topics.length} topics · ${total} live prediction markets`;
  document.getElementById("brief-badges").innerHTML = results.map(r =>
    `<span class="badge" style="background:${r.color}18;border:1px solid ${r.color}55;color:${r.color}">${r.topic}</span>`
  ).join("");
  document.getElementById("brief-cards").innerHTML = results.map(r =>
    renderCard(r.topic, r.events, r.summary, r.color, r.error)
  ).join("");

  btn.disabled = false;
}

renderTopics();
</script>
</body>
</html>
